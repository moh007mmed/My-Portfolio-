<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تواصل معي | محمد محمود الريح</title>
<meta name="description" content="تواصل مع محمد محمود الريح لبدء مشروعك القادم — موقع ويب، نظام ذكاء اصطناعي، أو حملة تسويق رقمي.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%230B0E14'/%3E%3Ctext x='50' y='69' font-family='Arial' font-size='56' font-weight='700' fill='%23F2B84B' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#0B0E14; --ink-2:#0F1320; --surface:#141928; --surface-2:#1B2233; --border:#252D40;
  --text:#EDEFF4; --text-muted:#8B93A7; --text-faint:#565F78;
  --blue:#5B8DEF; --blue-soft:rgba(91,141,239,.12); --blue-line:rgba(91,141,239,.35);
  --gold:#F2B84B; --gold-soft:rgba(242,184,75,.12); --gold-line:rgba(242,184,75,.35);
  --radius:16px; --radius-sm:10px;
  --font-display:'Space Grotesk','Cairo',sans-serif;
  --font-body:'Inter','Cairo',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
  --container:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink); color:var(--text); font-family:var(--font-body);
  font-size:16px; line-height:1.65; -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
ul{list-style:none}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
input,textarea{font:inherit}
.container{max-width:var(--container);margin-inline:auto;padding-inline:24px}
.icon{width:20px;height:20px;flex-shrink:0}
[dir="rtl"] .flip-rtl{transform:scaleX(-1)}
::selection{background:var(--gold);color:var(--ink)}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}

/* ---------- Type ---------- */
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;letter-spacing:-.01em;line-height:1.15}
.eyebrow{
  font-family:var(--font-mono);font-size:12.5px;letter-spacing:.08em;color:var(--gold);
  display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;
}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.accent-blue{color:var(--blue)}
.accent-gold{color:var(--gold)}
.section-head{max-width:640px;margin-inline:auto;text-align:center;margin-bottom:56px}
.section-head h2{font-size:clamp(28px,4vw,40px);margin-bottom:14px}
.section-head p{color:var(--text-muted);font-size:17px}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:999px;
  font-weight:600;font-size:15px;transition:transform .25s var(--ease),box-shadow .25s var(--ease),background .25s;
  white-space:nowrap;
}
.btn-primary{background:linear-gradient(135deg,var(--gold),#E0A030);color:#1A1204}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px -8px rgba(242,184,75,.45)}
.btn-ghost{border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--blue-line);background:var(--blue-soft);transform:translateY(-2px)}
.btn .icon-arrow{width:16px;height:16px}

/* ---------- Tag / pill ---------- */
.tag{
  font-family:var(--font-mono);font-size:11.5px;letter-spacing:.06em;padding:5px 11px;
  border-radius:999px;display:inline-block;border:1px solid;
}
.tag-web{color:var(--blue);border-color:var(--blue-line);background:var(--blue-soft)}
.tag-ai{color:var(--gold);border-color:var(--gold-line);background:var(--gold-soft)}

/* ---------- Nav ---------- */
.nav{
  position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
  background:rgba(11,14,20,.75);border-bottom:1px solid var(--border);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:74px;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:17px}
.logo-mark{
  width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--blue));
  display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;font-size:16px;
}
.nav-links{display:none;align-items:center;gap:6px}
.nav-link{padding:9px 15px;border-radius:999px;font-size:14.5px;color:var(--text-muted);transition:.2s}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-link.active{color:var(--text);background:var(--surface-2)}
.nav-right{display:flex;align-items:center;gap:10px}
.lang-btn{
  font-family:var(--font-mono);font-size:12.5px;border:1px solid var(--border);border-radius:999px;
  padding:8px 14px;display:flex;align-items:center;gap:6px;transition:.2s;
}
.lang-btn:hover{border-color:var(--gold-line);color:var(--gold)}
.nav-cta{display:none}
.menu-btn{display:flex;width:40px;height:40px;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:10px}
.mobile-panel{
  position:fixed;inset:74px 0 0 0;background:var(--ink);z-index:99;padding:28px 24px;
  transform:translateY(-8px);opacity:0;pointer-events:none;transition:.25s var(--ease);
}
.mobile-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}
.mobile-panel a{display:block;padding:16px 4px;font-size:19px;border-bottom:1px solid var(--border);font-family:var(--font-display);font-weight:600}
@media(min-width:900px){
  .nav-links{display:flex}
  .nav-cta{display:inline-flex}
  .menu-btn{display:none}
}

/* ---------- Hero ---------- */
.hero{position:relative;padding-block:96px 80px;overflow:hidden}
.hero-bg{
  position:absolute;inset:-20% -10% auto -10%;height:140%;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(ellipse 65% 55% at 50% 25%,#000 35%,transparent 85%);
  mask-image:radial-gradient(ellipse 65% 55% at 50% 25%,#000 35%,transparent 85%);
  opacity:.5;pointer-events:none;
}
.node{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px 2px var(--gold);animation:float 7s ease-in-out infinite}
.node:nth-child(2){background:var(--blue);box-shadow:0 0 14px 2px var(--blue);animation-delay:-2s}
.node:nth-child(3){animation-delay:-4s}
.node:nth-child(4){background:var(--blue);box-shadow:0 0 14px 2px var(--blue);animation-delay:-5.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.hero-inner{position:relative;text-align:center;max-width:820px;margin-inline:auto}
.hero h1{font-size:clamp(32px,5.6vw,58px);margin-bottom:22px;opacity:0;animation:fadeUp .7s var(--ease) .15s forwards}
.hero .eyebrow{opacity:0;animation:fadeUp .7s var(--ease) 0s forwards}
.hero-sub{font-size:clamp(16px,2vw,19px);color:var(--text-muted);max-width:620px;margin-inline:auto 34px;opacity:0;animation:fadeUp .7s var(--ease) .3s forwards}
.hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp .7s var(--ease) .45s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ---------- Pillars ---------- */
.pillars{padding-block:80px}
.pillar-grid{display:grid;gap:20px;grid-template-columns:1fr}
.pillar-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:34px;transition:.3s var(--ease);
}
.pillar-card:hover{transform:translateY(-5px);border-color:var(--card-line,var(--gold-line))}
.pillar-card.web{--card-line:var(--blue-line)}
.pillar-card.ai{--card-line:var(--gold-line)}
.pillar-icon{
  width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;
}
.pillar-card.web .pillar-icon{background:var(--blue-soft);color:var(--blue)}
.pillar-card.ai .pillar-icon{background:var(--gold-soft);color:var(--gold)}
.pillar-card h3{font-size:22px;margin:14px 0 10px}
.pillar-card p{color:var(--text-muted);margin-bottom:20px}
.pillar-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14.5px}
.pillar-card.web .pillar-link{color:var(--blue)}
.pillar-card.ai .pillar-link{color:var(--gold)}
@media(min-width:760px){.pillar-grid{grid-template-columns:1fr 1fr}}

/* ---------- Projects ---------- */
.projects{padding-block:80px;background:var(--ink-2);border-block:1px solid var(--border)}
.project-grid{display:grid;gap:20px;grid-template-columns:1fr}
.project-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;transition:.3s var(--ease);
}
.project-card:hover{transform:translateY(-5px);box-shadow:0 20px 40px -20px rgba(0,0,0,.5)}
.project-media{
  height:150px;position:relative;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 20% 20%,var(--blue-soft),transparent 60%),
    radial-gradient(circle at 80% 80%,var(--gold-soft),transparent 60%),var(--surface-2);
  border-bottom:1px solid var(--border);
}
.project-media span{font-family:var(--font-mono);font-size:13px;color:var(--text-faint)}
.project-body{padding:26px;display:flex;flex-direction:column;gap:12px;flex:1}
.project-tags{display:flex;gap:8px;flex-wrap:wrap}
.project-body h3{font-size:19px}
.project-body p{color:var(--text-muted);font-size:14.5px;flex:1}
.project-foot{display:flex;justify-content:center;margin-top:44px}

/* ---------- Value strip ---------- */
.values{padding-block:80px}
.value-grid{display:grid;gap:28px;grid-template-columns:1fr}
.value-item{padding-inline-start:20px;border-inline-start:2px solid var(--border)}
.value-item .n{font-family:var(--font-mono);color:var(--gold);font-size:13px;display:block;margin-bottom:10px}
.value-item h4{font-size:18px;margin-bottom:8px}
.value-item p{color:var(--text-muted);font-size:14.5px}
@media(min-width:760px){.value-grid{grid-template-columns:repeat(3,1fr)}}

/* ---------- CTA band ---------- */
.cta-band{
  margin-inline:24px;margin-block:20px;border-radius:24px;padding:64px 32px;text-align:center;
  background:linear-gradient(135deg,var(--surface),var(--surface-2));border:1px solid var(--border);position:relative;overflow:hidden;
}
.cta-band h2{font-size:clamp(26px,4vw,36px);margin-bottom:14px}
.cta-band p{color:var(--text-muted);margin-bottom:30px}

/* ---------- Footer ---------- */
footer{padding-block:64px 32px;border-top:1px solid var(--border)}
.footer-grid{display:grid;gap:40px;grid-template-columns:1fr;margin-bottom:40px}
.footer-brand p{color:var(--text-muted);font-size:14.5px;margin-top:14px;max-width:320px}
.footer-col h5{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;color:var(--text-faint);margin-bottom:16px}
.footer-col a{display:block;color:var(--text-muted);font-size:14.5px;padding-block:6px;transition:.2s}
.footer-col a:hover{color:var(--gold)}
.social-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.social-row a{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:.2s;
}
.social-row a:hover{color:var(--gold);border-color:var(--gold-line);transform:translateY(-2px)}
.social-row svg{width:17px;height:17px}
.footer-bottom{display:flex;flex-direction:column;gap:10px;padding-top:28px;border-top:1px solid var(--border);color:var(--text-faint);font-size:13px;text-align:center}
@media(min-width:760px){.footer-grid{grid-template-columns:1.4fr 1fr 1fr}.footer-bottom{flex-direction:row;justify-content:space-between;text-align:start}}

/* ---------- Reveal ---------- */
[data-reveal]{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
[data-reveal].in{opacity:1;transform:translateY(0)}

/* ---------- Page header (sub-pages) ---------- */
.page-hero{padding-block:56px 48px}
.page-hero h1{font-size:clamp(30px,4.8vw,46px)}
.page-hero .hero-sub{margin-bottom:0}

/* ---------- Page header (sub-pages) ---------- */
.page-hero{padding-block:56px 48px}
.page-hero h1{font-size:clamp(30px,4.8vw,46px)}
.page-hero .hero-sub{margin-bottom:0}

/* ---------- Page header (sub-pages) ---------- */
.page-hero{padding-block:56px 40px}
.page-hero h1{font-size:clamp(30px,4.8vw,46px)}
.page-hero .hero-sub{margin-bottom:0}

/* ---------- Page header (sub-pages) ---------- */
.page-hero{padding-block:56px 40px}
.page-hero h1{font-size:clamp(30px,4.8vw,46px)}
.page-hero .hero-sub{margin-bottom:0}

/* ---------- Page header (sub-pages) ---------- */
.page-hero{padding-block:56px 40px}
.page-hero h1{font-size:clamp(30px,4.8vw,46px)}
.page-hero .hero-sub{margin-bottom:0}

/* ---------- Contact layout ---------- */
.contact-section{padding-block:16px 90px}
.contact-grid{display:grid;gap:24px;grid-template-columns:1fr}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:8px;font-family:var(--font-mono)}
.field input,.field select,.field textarea{
  width:100%;background:var(--ink-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 16px;color:var(--text);font-size:14.5px;font-family:var(--font-body);
}
.field input::placeholder,.field textarea::placeholder{color:var(--text-faint)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold-line)}
.field textarea{resize:vertical;min-height:120px}
.field-row{display:grid;gap:16px;grid-template-columns:1fr}
.form-msg{margin-top:16px;font-size:14px;color:var(--gold);display:none}
.form-msg.show{display:block}
@media(min-width:640px){.field-row{grid-template-columns:1fr 1fr}}

.side-stack{display:flex;flex-direction:column;gap:16px}
.side-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.avail-badge{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;margin-bottom:6px}
.avail-badge .dot-blink{width:8px;height:8px;border-radius:50%;background:#4ADE80;box-shadow:0 0 10px #4ADE80;animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.side-card p{color:var(--text-muted);font-size:13.5px}
.contact-chip{
  display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:10px;transition:.2s;
}
.contact-chip:last-child{margin-bottom:0}
.contact-chip:hover{border-color:var(--gold-line);background:var(--surface-2)}
.contact-chip .icon-wrap{width:36px;height:36px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-chip .icon-wrap svg{width:17px;height:17px}
.contact-chip .label{font-size:12px;color:var(--text-faint);font-family:var(--font-mono)}
.contact-chip .value{font-size:14px;font-weight:600}
.contact-chip .value.todo{font-family:var(--font-mono);font-size:12.5px;color:var(--text-faint);font-weight:400}
@media(min-width:900px){.contact-grid{grid-template-columns:1.5fr 1fr}}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
  .hero h1,.hero .eyebrow,.hero-sub,.hero-ctas{opacity:1}
}
</style>
</head>

        </div>

function currentLang(){ return new URLSearchParams(location.search).get('lang')==='en' ? 'en' : 'ar'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==='ar' ? 'rtl' : 'ltr';
  const dict = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k]!==undefined) el.textContent = dict[k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    const k = el.getAttribute('data-i18n-html');
    if(dict[k]!==undefined) el.innerHTML = dict[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const k = el.getAttribute('data-i18n-placeholder');
    if(dict[k]!==undefined) el.setAttribute('placeholder', dict[k]);
  });
  document.title = dict.meta_title;
  const metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content', dict.meta_desc);
  const langLabel = document.getElementById('langBtnLabel');
  if(langLabel) langLabel.textContent = lang==='ar' ? 'EN' : 'ع';

  const page = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('a[data-nav]').forEach(a=>{
    const base = a.getAttribute('data-nav');
    a.setAttribute('href', lang==='en' ? base + '?lang=en' : base);
    a.classList.toggle('active', base===page);
  });
  history.replaceState(null,'', lang==='en' ? (location.pathname+'?lang=en') : location.pathname);
}

document.getElementById('langBtn').addEventListener('click', ()=>{
  applyLang(currentLang()==='ar' ? 'en' : 'ar');
});

const menuBtn = document.getElementById('menuBtn');
const mobilePanel = document.getElementById('mobilePanel');
menuBtn.addEventListener('click', ()=>{
  const open = mobilePanel.classList.toggle('open');
  document.getElementById('menuIconOpen').style.display = open ? 'none':'block';
  document.getElementById('menuIconClose').style.display = open ? 'block':'none';
});
document.querySelectorAll('.mobile-panel a').forEach(a=>a.addEventListener('click',()=>{
  mobilePanel.classList.remove('open');
  document.getElementById('menuIconOpen').style.display='block';
  document.getElementById('menuIconClose').style.display='none';
}));

const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
},{threshold:.12});
document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));

document.getElementById('contactForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  document.getElementById('formMsg').classList.add('show');
  e.target.reset();
});

applyLang(currentLang());
